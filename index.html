<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPL League</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

body{
    background:#f6f7fb;
    color:#111;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:white;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{
    width:45px;
}

.logo h1{
    font-size:22px;
    font-weight:900;
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links button{
    background:none;
    border:none;
    font-weight:600;
    cursor:pointer;
    padding:8px 12px;
    border-radius:8px;
    transition:.2s;
}

.nav-links button:hover{
    background:#ffecec;
    color:#d60000;
}

/* HERO */
.hero{
    margin:30px;
    border-radius:25px;
    overflow:hidden;
    position:relative;
}

.hero img{
    width:100%;
    height:320px;
    object-fit:cover;
    filter:brightness(.8);
}

.hero-content{
    position:absolute;
    bottom:30px;
    left:30px;
    color:white;
}

.hero-content h1{
    font-size:50px;
    font-weight:900;
}

.hero-content p{
    margin-top:8px;
    opacity:.9;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding:30px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    border:1px solid #eee;
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 40px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h2{
    font-size:20px;
    margin-bottom:6px;
}

.card-content p{
    color:#555;
}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

/* EMBED */
iframe{
    width:100%;
    height:90vh;
    border:none;
    border-radius:20px;
    background:white;
    margin:20px;
}

/* SECTION TITLE */
.section-title{
    font-size:28px;
    font-weight:900;
    padding:20px 30px 0;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="logo.png">
        <h1>RPL</h1>
    </div>

    <div class="nav-links">
        <button onclick="openPage('home')">Home</button>
        <button onclick="openPage('caps')">Salary Caps</button>
        <button onclick="openPage('database')">Database</button>
        <button onclick="openPage('picks')">PrizePicks</button>
        <button onclick="openPage('stars')">Star System</button>
        <button onclick="openPage('standings')">Standings</button>
        <button onclick="openPage('power')">Power Rankings</button>
        <button onclick="openPage('awards')">Awards</button>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">

    <!-- HERO IMAGE -->
    <div class="hero">
        <img src="hero.jpg"> <!-- REPLACE -->
        <div class="hero-content">
            <h1>RPL SEASON 10</h1>
            <p>Official League Hub</p>
        </div>
    </div>

    <!-- MAIN CARDS -->
    <div class="grid">

        <div class="card" onclick="openPage('caps')">
            <img src="caps.jpg"> <!-- REPLACE -->
            <div class="card-content">
                <h2>Salary Caps</h2>
                <p>View contracts, payroll & rules</p>
            </div>
        </div>

        <div class="card" onclick="openPage('database')">
            <img src="database.jpg">
            <div class="card-content">
                <h2>Player Database</h2>
                <p>Browse all players & ratings</p>
            </div>
        </div>

        <div class="card" onclick="openPage('picks')">
            <img src="picks.jpg">
            <div class="card-content">
                <h2>PrizePicks</h2>
                <p>Submit your picks</p>
            </div>
        </div>

        <div class="card">
            <img src="standings.jpg">
            <div class="card-content">
                <h2>Standings</h2>
                <p>Coming Soon</p>
            </div>
        </div>

    </div>
</div>

<!-- CAPS -->
<div id="caps" class="page">
    <div class="section-title">Salary Caps</div>
    <iframe src="salary.html"></iframe>
</div>

<!-- DATABASE -->
<div id="database" class="page">
    <div class="section-title">Player Database</div>
    <iframe src="database.html"></iframe>
</div>

<!-- PICKS -->
<div id="picks" class="page">
    <div class="section-title">PrizePicks</div>
    <iframe src="picks.html"></iframe>
</div>

<!-- STAR SYSTEM -->
<div id="stars" class="page">
    <div class="section-title">Star System</div>
    <iframe src="stars.html"></iframe>
</div>

<!-- FUTURE -->
<div id="standings" class="page"><h1 style="padding:30px;">Coming Soon</h1></div>
<div id="power" class="page"><h1 style="padding:30px;">Coming Soon</h1></div>
<div id="awards" class="page"><h1 style="padding:30px;">Coming Soon</h1></div>

<script>
function openPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
