<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://media.discordapp.net/attachments/1447379249659908117/1500568494847164446/rpllogo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Official RPL Website</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    background:#0a0a0b;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* CURSOR */
.cursor{
    position:fixed;
    width:280px;
    height:280px;
    background:radial-gradient(circle, rgba(255,0,0,.25), transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:-1;
    transition:.15s ease;
}

/* NAV */
.navbar{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(14px);
    background:rgba(10,10,11,.75);
    border-bottom:1px solid rgba(255,255,255,.05);
    display:flex;
    justify-content:space-between;
    padding:18px 40px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{width:38px;}
.logo h1{font-weight:900;color:#ff0000;}

.nav-links button{
    background:none;
    border:none;
    color:#9ca3af;
    padding:8px 14px;
    cursor:pointer;
    position:relative;
    transition:.2s;
}

.nav-links button::after{
    content:'';
    position:absolute;
    bottom:0;
    left:0;
    width:0%;
    height:2px;
    background:#ff0000;
    transition:.3s;
}

.nav-links button:hover{
    color:white;
}

.nav-links button:hover::after{
    width:100%;
}

/* CONTAINER */
.container{
    max-width:1300px;
    margin:auto;
    padding:40px 20px;
    position:relative;
}

/* HERO */
.hero{
    position:relative;
    height:360px;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:30px;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.4);
    transform:scale(1.05);
}

/* animated glow */
.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 70% 40%, rgba(255,0,0,.25), transparent 60%);
    animation:heroGlow 6s infinite alternate;
}

@keyframes heroGlow{
    from{opacity:.3;}
    to{opacity:.7;}
}

.hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:
    linear-gradient(to right, rgba(0,0,0,.9), transparent 70%),
    linear-gradient(to top, rgba(0,0,0,.8), transparent);
}

/* TEXT */
.hero-content{
    position:absolute;
    z-index:2;
    padding:60px;
    max-width:600px;
    animation:fadeUp .8s ease forwards;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.hero-content h1{
    font-size:58px;
    font-weight:900;
    color:white;
}

.hero-content span{
    color:#ff0000;
}

.hero-content p{
    margin-top:12px;
    color:#d1d5db;
    line-height:1.6;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

/* CARD */
.card{
    background:#111114;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #1a1a1d;
    transition:.25s;
    cursor:pointer;
    position:relative;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    transition:.3s;
}

.card:hover img{
    transform:scale(1.08);
}

/* hover lighting */
.card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.2), transparent);
    opacity:0;
    transition:.3s;
}

.card:hover::before{
    opacity:1;
}

.card:hover{
    transform:translateY(-8px);
    border-color:#ff0000;
    box-shadow:0 20px 60px rgba(255,0,0,.25);
}

.card-content{
    padding:16px;
}

.card-content h2{
    font-size:16px;
    font-weight:700;
}

.card-content p{
    margin-top:5px;
    font-size:13px;
    color:#9ca3af;
}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

iframe{
    width:100%;
    height:85vh;
    border:none;
    border-radius:12px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="navbar">
    <div class="logo">
        <img src="https://media.discordapp.net/attachments/1447379249659908117/1500568494847164446/rpllogo.png">
        <h1>RPL</h1>
    </div>

    <div class="nav-links">
        <button onclick="openPage('home')">Home</button>
        <button onclick="openPage('caps')">Salary Caps</button>
        <button onclick="openPage('database')">Database</button>
        <button onclick="openPage('picks')">PrizePicks</button>
        <button onclick="openPage('stars')">Star System</button>
    </div>
</div>

<div class="container">

<div id="home" class="page active">

<div class="hero">
    <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1600">
    
    <div class="hero-content">
        <h1>RPL <span>SEASON 10</span></h1>
        <p>
        The most advanced click-to-shoot CBL/LBA on Roblox. Structured competition,
        elite gameplay, and a fully built league system.
        </p>
    </div>
</div>

<div class="grid">

<div class="card" onclick="openPage('caps')">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1600">
    <div class="card-content">
        <h2>Salary Caps</h2>
        <p>Contracts & payroll system</p>
    </div>
</div>

<div class="card" onclick="openPage('database')">
    <img src="https://images.unsplash.com/photo-1504457047772-27faf1c00561?q=80&w=1600">
    <div class="card-content">
        <h2>Player Database</h2>
        <p>Full league roster</p>
    </div>
</div>

<div class="card" onclick="openPage('picks')">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1600">
    <div class="card-content">
        <h2>PrizePicks</h2>
        <p>Submit your picks</p>
    </div>
</div>

</div>
</div>

<div id="caps" class="page"><iframe src="salary.html"></iframe></div>
<div id="database" class="page"><iframe src="database.html"></iframe></div>
<div id="picks" class="page"><iframe src="picks.html"></iframe></div>
<div id="stars" class="page"><iframe src="stars.html"></iframe></div>

</div>

<script>
function openPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* CURSOR */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX+"px";
    cursor.style.top = e.clientY+"px";
});

/* hover pulse */
document.querySelectorAll('button, .card').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
        cursor.style.width="350px";
        cursor.style.height="350px";
    });
    el.addEventListener('mouseleave',()=>{
        cursor.style.width="280px";
        cursor.style.height="280px";
    });
});
</script>

</body>
</html>
