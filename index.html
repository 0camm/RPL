<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://media.discordapp.net/attachments/1447379249659908117/1500568494847164446/rpllogo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Official RPL Website</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    background:#0a0a0b;
    color:#e5e7eb;
    overflow-x:hidden;
}

/* CURSOR */
.cursor{
    position:fixed;
    width:300px;
    height:300px;
    background:radial-gradient(circle, rgba(255,0,0,.25), transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:0;
    transition:0.1s;
}

/* NAV */
.navbar{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(14px);
    background:rgba(10,10,11,.75);
    border-bottom:1px solid rgba(255,255,255,.05);
    display:flex;
    justify-content:space-between;
    padding:18px 40px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{width:38px;}
.logo h1{font-weight:900;color:#ff0000;}

/* NAV BUTTONS */
.nav-links button{
    background:none;
    border:none;
    color:#9ca3af;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:.25s;
    position:relative;
}

.nav-links button::after{
    content:'';
    position:absolute;
    bottom:0;
    left:50%;
    width:0%;
    height:2px;
    background:#ff0000;
    transition:.3s;
}

.nav-links button:hover{
    color:white;
}

.nav-links button:hover::after{
    width:60%;
    left:20%;
}

/* CONTAINER */
.container{
    max-width:1300px;
    margin:auto;
    padding:40px 20px;
    position:relative;
    z-index:2;
}

/* HERO */
.hero{
    position:relative;
    height:360px;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:30px;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.7;
}

.hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:
    linear-gradient(to right, rgba(0,0,0,.85), transparent),
    linear-gradient(to top, rgba(0,0,0,.7), transparent),
    radial-gradient(circle at right, rgba(255,0,0,.3), transparent 60%);
}

.hero-content{
    position:absolute;
    z-index:2;
    padding:50px;
    max-width:600px;
}

.hero-content h1{
    font-size:56px;
    font-weight:900;
}

.hero-content span{
    color:#ff0000;
}

.hero-content p{
    margin-top:10px;
    color:#9ca3af;
    line-height:1.5;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

/* CARD */
.card{
    background:#111114;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #1a1a1d;
    transition:.3s;
    cursor:pointer;
    transform-style:preserve-3d;
}

/* hover lighting */
.card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.2), transparent);
    opacity:0;
    transition:.3s;
}

.card:hover::before{
    opacity:1;
}

.card:hover{
    border-color:#ff0000;
    box-shadow:0 20px 60px rgba(255,0,0,.2);
}

/* IMAGE */
.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:16px;
}

.card-content h2{
    font-size:16px;
    font-weight:700;
}

.card-content p{
    margin-top:5px;
    font-size:13px;
    color:#9ca3af;
}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

iframe{
    width:100%;
    height:85vh;
    border:none;
    border-radius:12px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="navbar">
    <div class="logo">
        <img src="https://media.discordapp.net/attachments/1447379249659908117/1500568494847164446/rpllogo.png">
        <h1>RPL</h1>
    </div>

    <div class="nav-links">
        <button onclick="openPage('home')">Home</button>
        <button onclick="openPage('caps')">Salary Caps</button>
        <button onclick="openPage('database')">Database</button>
        <button onclick="openPage('picks')">PrizePicks</button>
        <button onclick="openPage('stars')">Star System</button>
        <button onclick="openPage('standings')">Standings</button>
        <button onclick="openPage('power')">Power Rankings</button>
        <button onclick="openPage('awards')">Awards</button>
    </div>
</div>

<div class="container">

<div id="home" class="page active">

<div class="hero">
    <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1600">
    <div class="hero-content">
        <h1>RPL <span>SEASON 10</span></h1>
        <p>
        The most advanced click-to-shoot CBL/LBA on Roblox. Structured competition,
        elite gameplay, and a fully built league system.
        </p>
    </div>
</div>

<div class="grid">

<div class="card" onclick="openPage('caps')">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1600">
    <div class="card-content">
        <h2>Salary Caps</h2>
        <p>Contracts & payroll system</p>
    </div>
</div>

<div class="card" onclick="openPage('database')">
    <img src="https://images.unsplash.com/photo-1504457047772-27faf1c00561?q=80&w=1600">
    <div class="card-content">
        <h2>Player Database</h2>
        <p>Full league roster</p>
    </div>
</div>

<div class="card" onclick="openPage('picks')">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1600">
    <div class="card-content">
        <h2>PrizePicks</h2>
        <p>Submit your picks</p>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1600">
    <div class="card-content">
        <h2>Standings</h2>
        <p>Coming soon</p>
    </div>
</div>

</div>
</div>

<div id="caps" class="page"><iframe src="salary.html"></iframe></div>
<div id="database" class="page"><iframe src="database.html"></iframe></div>
<div id="picks" class="page"><iframe src="picks.html"></iframe></div>
<div id="stars" class="page"><iframe src="stars.html"></iframe></div>

</div>

<script>
function openPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX+"px";
    cursor.style.top = e.clientY+"px";
});

/* CARD TILT */
document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mousemove', e=>{
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const rotateX = (y - rect.height/2)/20;
        const rotateY = (rect.width/2 - x)/20;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    card.addEventListener('mouseleave', ()=>{
        card.style.transform = "rotateX(0) rotateY(0)";
    });
});
</script>

</body>
</html>
