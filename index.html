<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

body{
    background:
    radial-gradient(circle at 20% 0%, rgba(255,0,0,.25), transparent 30%),
    radial-gradient(circle at 80% 10%, rgba(255,0,0,.15), transparent 40%),
    #030303;
    color:white;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:240px;
    height:100vh;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(15px);
    border-right:1px solid rgba(255,0,0,.15);
    padding:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:30px;
}

.logo img{width:50px;}
.logo h1{font-weight:900;}

.nav{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.nav button{
    background:none;
    border:none;
    color:white;
    padding:12px;
    border-radius:12px;
    text-align:left;
    cursor:pointer;
    transition:.2s;
}

.nav button:hover{
    background:rgba(255,0,0,.2);
    transform:translateX(5px);
}

/* MAIN */
.main{
    margin-left:240px;
    padding:30px;
}

/* HERO */
.hero{
    background:linear-gradient(135deg,#7f1d1d,#000);
    padding:50px;
    border-radius:25px;
    margin-bottom:30px;
    position:relative;
    overflow:hidden;
}

.hero::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(255,0,0,.4), transparent);
    top:-100px;
    right:-100px;
}

.hero h1{
    font-size:60px;
    font-weight:900;
}

.hero p{
    opacity:.8;
    margin-top:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:25px;
    border-radius:20px;
    border:1px solid rgba(255,0,0,.1);
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
    border-color:red;
    box-shadow:0 20px 50px rgba(255,0,0,.25);
}

/* PAGE SWITCH */
.page{display:none;}
.page.active{display:block;}

/* EMBED */
iframe{
    width:100%;
    height:90vh;
    border:none;
    border-radius:20px;
    background:black;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <img src="logo.png">
        <h1>RPL</h1>
    </div>

    <div class="nav">
        <button onclick="openPage('home')">🏠 Home</button>
        <button onclick="openPage('caps')">💰 Salary Caps</button>
        <button onclick="openPage('database')">📊 Database</button>
        <button onclick="openPage('picks')">🎯 PrizePicks</button>
        <button onclick="openPage('stars')">⭐ Star System</button>
        <button onclick="openPage('standings')">📈 Standings</button>
        <button onclick="openPage('power')">🔥 Power Rankings</button>
        <button onclick="openPage('awards')">🏆 Awards</button>
    </div>
</div>

<div class="main">

<!-- HOME -->
<div id="home" class="page active">
    <div class="hero">
        <h1>RPL SEASON 10</h1>
        <p>Official League Hub • Contracts • Stats • Rankings</p>
    </div>

    <div class="grid">
        <div class="card" onclick="openPage('caps')">
            <h2>Salary Caps</h2>
            <p>Contracts, payroll, cap rules</p>
        </div>

        <div class="card" onclick="openPage('database')">
            <h2>Player Database</h2>
            <p>All players with ratings</p>
        </div>

        <div class="card" onclick="openPage('picks')">
            <h2>PrizePicks</h2>
            <p>Submit daily picks</p>
        </div>

        <div class="card">
            <h2>Standings</h2>
            <p>Coming soon</p>
        </div>
    </div>
</div>

<!-- CAPS -->
<div id="caps" class="page">
    <iframe src="salary.html"></iframe>
</div>

<!-- DATABASE -->
<div id="database" class="page">
    <iframe src="database.html"></iframe>
</div>

<!-- PICKS -->
<div id="picks" class="page">
    <iframe src="picks.html"></iframe>
</div>

<!-- STAR SYSTEM -->
<div id="stars" class="page">
    <iframe src="stars.html"></iframe>
</div>

<!-- FUTURE -->
<div id="standings" class="page"><h1>Coming Soon</h1></div>
<div id="power" class="page"><h1>Coming Soon</h1></div>
<div id="awards" class="page"><h1>Coming Soon</h1></div>

</div>

<script>
function openPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
