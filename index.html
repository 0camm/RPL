<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPL League</title>

<link rel="icon" href="https://media.discordapp.net/attachments/1447379249659908117/1500568494847164446/rpllogo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

body{
    background:#050506;
    color:white;
    overflow-x:hidden;
}

/* CURSOR */
.cursor{
    position:fixed;
    width:320px;
    height:320px;
    background:radial-gradient(circle, rgba(255,0,0,.25), transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:-1;
    transition:.15s;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    position:sticky;
    top:0;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(12px);
    z-index:10;
}

.logo{
    display:flex;
    gap:10px;
    align-items:center;
}

.logo img{width:38px;}
.logo h1{color:#ff0000;font-weight:900;}

.nav button{
    background:none;
    border:none;
    color:#aaa;
    margin-left:20px;
    cursor:pointer;
    transition:.2s;
}

.nav button:hover{color:white;}

/* HERO */
.hero{
    position:relative;
    height:420px;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(.3);
    transform:scale(1.1);
}

/* moving glow */
.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 70% 40%, rgba(255,0,0,.25), transparent);
    animation:moveGlow 6s infinite alternate;
}

@keyframes moveGlow{
    from{transform:translateX(-20px);}
    to{transform:translateX(20px);}
}

/* TEXT BLOCK */
.hero-content{
    position:absolute;
    top:50%;
    left:70px;
    transform:translateY(-50%);
    background:linear-gradient(to right, rgba(0,0,0,.9), rgba(0,0,0,.4));
    padding:50px;
    border-radius:14px;
    max-width:600px;
    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(-50%);}
}

.hero-content h1{
    font-size:60px;
    font-weight:900;
}

.hero-content span{color:#ff0000;}

.hero-content p{
    margin-top:12px;
    color:#ccc;
}

/* SECTION */
.section{
    padding:60px;
}

.section h2{
    font-size:22px;
    margin-bottom:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:24px;
}

/* CARD */
.card{
    background:#0f0f11;
    border-radius:16px;
    overflow:hidden;
    border:1px solid #1a1a1d;
    transition:.3s;
    transform-style:preserve-3d;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    transition:.3s;
}

.card:hover img{transform:scale(1.08);}

.card:hover{
    transform:translateY(-10px);
    border-color:#ff0000;
    box-shadow:0 25px 70px rgba(255,0,0,.25);
}

/* INFO STRIP */
.info{
    display:flex;
    gap:20px;
    padding:50px;
}

.box{
    flex:1;
    background:#0f0f11;
    padding:25px;
    border-radius:12px;
    border:1px solid #1a1a1d;
}

.box h3{color:#888;font-size:13px;}
.box p{margin-top:5px;font-weight:700;}

.links a{
    display:block;
    margin-top:6px;
    color:#ff0000;
    text-decoration:none;
}

/* FOOTER */
.footer{
    padding:30px;
    text-align:center;
    color:#666;
}

/* TILT */
.card{
    perspective:1000px;
}

.card-inner{
    transition:transform .2s;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- NAV -->
<div class="nav">
    <div class="logo">
        <img src="https://media.discordapp.net/attachments/1447379249659908117/1500568494847164446/rpllogo.png">
        <h1>RPL</h1>
    </div>

    <div>
        <button>Home</button>
        <button>Salary Caps</button>
        <button>Database</button>
        <button>PrizePicks</button>
        <button>Star System</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1600">
    
    <div class="hero-content">
        <h1>RPL <span>SEASON 10</span></h1>
        <p>
        The most advanced click-to-shoot CBL/LBA on Roblox.
        Structured competition and elite gameplay systems.
        </p>
    </div>
</div>

<!-- HUB -->
<div class="section">
    <h2>League Hub</h2>

    <div class="grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1600">
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1504457047772-27faf1c00561?q=80&w=1600">
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1600">
        </div>

    </div>
</div>

<!-- INFO -->
<div class="info">

    <div class="box">
        <h3>Status</h3>
        <p>Season Active</p>
    </div>

    <div class="box">
        <h3>Join</h3>
        <div class="links">
            <a href="#">Discord</a>
            <a href="#">Roblox Group</a>
        </div>
    </div>

    <div class="box">
        <h3>Teams</h3>
        <p>30 Franchises</p>
    </div>

</div>

<div class="footer">
RPL League — Competitive Roblox Basketball
</div>

<script>
/* CURSOR */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX+"px";
    cursor.style.top = e.clientY+"px";
});

/* CARD TILT */
document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mousemove', e=>{
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const rotateX = (y - rect.height/2)/20;
        const rotateY = (rect.width/2 - x)/20;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    card.addEventListener('mouseleave', ()=>{
        card.style.transform = "rotateX(0) rotateY(0)";
    });
});
</script>

</body>
</html>
