<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPL League</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    background:
    radial-gradient(circle at 10% 0%, #ffeaea, transparent 40%),
    radial-gradient(circle at 90% 0%, #fff0f0, transparent 40%),
    #f8fafc;
    color:#111;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(16px);
    background:rgba(255,255,255,.7);
    border-bottom:1px solid rgba(0,0,0,.05);
    display:flex;
    justify-content:space-between;
    padding:16px 40px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{width:44px;}

.logo h1{
    font-weight:900;
    letter-spacing:.5px;
}

.nav-links{
    display:flex;
    gap:12px;
}

.nav-links button{
    border:none;
    background:none;
    font-weight:600;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    transition:.25s;
}

.nav-links button:hover{
    background:rgba(255,0,0,.08);
}

/* MAIN */
.container{
    max-width:1400px;
    margin:auto;
    padding:30px;
}

/* HERO */
.hero{
    position:relative;
    height:320px;
    border-radius:24px;
    overflow:hidden;
    margin-bottom:35px;
    background:#ddd;
    box-shadow:0 25px 60px rgba(0,0,0,.08);
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:
    linear-gradient(to right, rgba(0,0,0,.65), transparent),
    linear-gradient(to top, rgba(0,0,0,.5), transparent);
}

.hero-content{
    position:absolute;
    z-index:2;
    color:white;
    padding:40px;
}

.hero-content h1{
    font-size:56px;
    font-weight:900;
    letter-spacing:-1px;
}

.hero-content p{
    margin-top:10px;
    opacity:.9;
    font-size:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:24px;
}

/* CARD */
.card{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    background:white;
    border:1px solid rgba(0,0,0,.05);
    transition:.35s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-10px) scale(1.01);
    box-shadow:0 25px 60px rgba(0,0,0,.12);
}

.card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(255,0,0,.15), transparent);
    opacity:0;
    transition:.4s;
}

.card:hover::before{
    opacity:1;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    background:#eee;
}

.card-content{
    padding:18px;
}

.card-content h2{
    font-size:18px;
    font-weight:800;
}

.card-content p{
    margin-top:6px;
    color:#666;
    font-size:14px;
}

/* PAGE SYSTEM */
.page{display:none;}
.page.active{display:block;}

/* EMBEDS */
iframe{
    width:100%;
    height:85vh;
    border:none;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

/* FADE TRANSITION */
.fade{
    animation:fade .3s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        <img src="logo.png">
        <h1>RPL</h1>
    </div>

    <div class="nav-links">
        <button onclick="openPage('home')">Home</button>
        <button onclick="openPage('caps')">Salary Caps</button>
        <button onclick="openPage('database')">Database</button>
        <button onclick="openPage('picks')">PrizePicks</button>
        <button onclick="openPage('stars')">Star System</button>
        <button onclick="openPage('standings')">Standings</button>
        <button onclick="openPage('power')">Power Rankings</button>
        <button onclick="openPage('awards')">Awards</button>
    </div>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active fade">

    <div class="hero">
        <!-- ADD YOUR IMAGE -->
        <!-- <img src="banner.jpg"> -->
        <div class="hero-content">
            <h1>RPL Season 10</h1>
            <p>Elite League Experience</p>
        </div>
    </div>

    <div class="grid">

        <div class="card" onclick="openPage('caps')">
            <img src="caps.jpg">
            <div class="card-content">
                <h2>Salary Caps</h2>
                <p>Contracts, payroll, rules</p>
            </div>
        </div>

        <div class="card" onclick="openPage('database')">
            <img src="database.jpg">
            <div class="card-content">
                <h2>Player Database</h2>
                <p>Full roster & ratings</p>
            </div>
        </div>

        <div class="card" onclick="openPage('picks')">
            <img src="picks.jpg">
            <div class="card-content">
                <h2>PrizePicks</h2>
                <p>Submit your picks</p>
            </div>
        </div>

        <div class="card">
            <img src="standings.jpg">
            <div class="card-content">
                <h2>Standings</h2>
                <p>Coming soon</p>
            </div>
        </div>

    </div>
</div>

<!-- PAGES -->
<div id="caps" class="page fade">
    <iframe src="salary.html"></iframe>
</div>

<div id="database" class="page fade">
    <iframe src="database.html"></iframe>
</div>

<div id="picks" class="page fade">
    <iframe src="picks.html"></iframe>
</div>

<div id="stars" class="page fade">
    <iframe src="stars.html"></iframe>
</div>

<div id="standings" class="page"><h1>Coming Soon</h1></div>
<div id="power" class="page"><h1>Coming Soon</h1></div>
<div id="awards" class="page"><h1>Coming Soon</h1></div>

</div>

<script>
function openPage(id){
    document.querySelectorAll('.page').forEach(p=>{
        p.classList.remove('active');
    });

    const page = document.getElementById(id);
    page.classList.add('active','fade');
}
</script>

</body>
</html>
